name = "deutschdrop"
main = "src/index.ts"
compatibility_date = "2024-06-01"

[vars]
ENVIRONMENT = "production"
ADMIN_TELEGRAM_IDS = "8590766269,8014388174"

[[d1_databases]]
binding = "DB"
database_name = "deutschdrop-db"
# Run `npx wrangler d1 create deutschdrop-db`, then replace this placeholder with the returned database_id.
database_id = "d26385ff-94fe-45d3-a5a0-c63131019158"
migrations_dir = "src/db/migrations"

# Cron triggers for scheduled jobs
[triggers]
crons = ["0 * * * *", "0 20 * * *", "0 0 * * *"]

# Note: Set your Telegram bot token as a secret:
# wrangler secret put TELEGRAM_BOT_TOKEN
