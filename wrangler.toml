name = "deutschdrop"
main = "src/index.ts"
compatibility_date = "2024-06-01"

[vars]
ENVIRONMENT = "production"
ADMIN_TELEGRAM_IDS = "8590766269,8014388174"
PUBLIC_BASE_URL = "https://deutschdrop.aque7x.workers.dev"
AI_ENABLED = "true"
AI_PROVIDER_ORDER = "cloudflareAi,groqCloud,mistral,openrouter,gemini"
TTS_PROVIDER_ORDER = "voiceRssGerman,edgeTtsWorker"
TTS_LANGUAGE = "de-de"
TTS_AUDIO_FORMAT = "mp3"
EDGE_TTS_VOICE = "de-DE-KatjaNeural"
GEMINI_MODEL = "gemini-2.0-flash"
KIMI_MODEL = "moonshot-v1-8k"
GROK_MODEL = "llama-3.1-8b-instant"
CLOUDFLARE_AI_MODEL = "@cf/meta/llama-3.1-8b-instruct"
OPENROUTER_MODEL = "openrouter/free"
ZAI_MODEL = "glm-4.5-air"
MISTRAL_MODEL = "mistral-small-latest"
COHERE_MODEL = "command-r7b-12-2024"

[ai]
binding = "AI"

[[d1_databases]]
binding = "DB"
database_name = "deutschdrop-db"
# Run `npx wrangler d1 create deutschdrop-db`, then replace this placeholder with the returned database_id.
database_id = "d26385ff-94fe-45d3-a5a0-c63131019158"
migrations_dir = "src/db/migrations"

# Cron triggers for scheduled jobs
[triggers]
crons = ["* * * * *", "0 * * * *", "0 20 * * *", "0 0 * * *"]

# Note: Set your Telegram bot token as a secret:
# wrangler secret put TELEGRAM_BOT_TOKEN
